<svg viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Infinity Loop -->
  <g transform="translate(20, 10)">
    <!-- Left loop - Blue -->
    <path d="M 30 60 Q 0 60 0 30 Q 0 0 30 0 Q 60 0 60 30 Q 60 50 45 60"
          stroke="#0052CC" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Right loop - Teal -->
    <path d="M 60 30 Q 60 0 90 0 Q 120 0 120 30 Q 120 60 90 60 Q 60 60 60 45"
          stroke="#00BFA5" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Arrow inside left loop -->
    <path d="M 20 25 L 35 35 L 25 40"
          stroke="#0052CC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: Recall Loop -->
  <text x="180" y="52" font-family="Arial, sans-serif" font-size="42" font-weight="bold">
    <tspan fill="#0052CC">Recall</tspan>
    <tspan fill="#00BFA5" font-weight="600">Loop</tspan>
  </text>
</svg>
