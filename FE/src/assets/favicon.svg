<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BFA5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#f8f9fa"/>

  <!-- Infinity loop -->
  <g transform="translate(50, 50)">
    <!-- Left loop -->
    <path d="M 30 60 Q 0 60 0 30 Q 0 0 30 0 Q 60 0 60 30 Q 60 50 45 60"
          stroke="#0052CC" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Right loop -->
    <path d="M 60 30 Q 60 0 90 0 Q 120 0 120 30 Q 120 60 90 60 Q 60 60 60 45"
          stroke="#00BFA5" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Arrow -->
    <path d="M 20 25 L 35 35 L 25 40"
          stroke="#0052CC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
